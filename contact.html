<!DOCTYPE html>

<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>문의 - Sizlon Inc.</title>
  <meta name="description" content="주식회사 시즐론의 문의 안내 페이지입니다.">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="page">
    <section class="shell">
      <p class="eyebrow">Contact</p>
      <h1>문의</h1>

      <p>
        아래 폼으로 문의를 남겨 주세요.
      </p>

      <p class="muted">
        접수된 내용은 확인 후 답변합니다.
      </p>

      <hr class="rule">

      <form class="contact-form" action="/contact" method="post">
        <div class="form-grid">
          <label class="field">
            <span>이름</span>
            <input type="text" name="name" autocomplete="name" required maxlength="60">
          </label>

          <label class="field">
            <span>이메일</span>
            <input type="email" name="email" autocomplete="email" required maxlength="120">
          </label>

          <label class="field">
            <span>문의 유형</span>
            <select name="category" required>
              <option value="" selected disabled>선택해 주세요</option>
              <option value="general">일반 문의</option>
              <option value="business">제휴 문의</option>
              <option value="press">보도 문의</option>
            </select>
          </label>

          <label class="field field-full">
            <span>내용</span>
            <textarea name="message" rows="7" required maxlength="4000"></textarea>
          </label>

          <label class="honeypot" aria-hidden="true">
            <span>웹사이트</span>
            <input type="text" name="website" tabindex="-1" autocomplete="off">
          </label>
        </div>

        <div class="form-actions">
          <button type="submit">보내기</button>
        </div>
      </form>

      <hr class="rule">

      <nav class="nav" aria-label="페이지 이동">
        <a href="/">홈으로</a>
        <a href="/notices.html">공고 게시판</a>
      </nav>
    </section>
  </main>

  <footer class="page footer">
    <div class="footer-grid">
      <div>
        <p class="eyebrow">Contact</p>
        <p class="muted">문의 폼</p>
      </div>
      <div class="footer-links">
        <a href="/about.html">회사 소개</a>
        <a href="/notices.html">공고</a>
      </div>
    </div>
  </footer>
</body>
</html>
