<!DOCTYPE html>

<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>문의 - Sizlon Inc.</title>
  <meta name="description" content="주식회사 시즐론의 문의 페이지입니다.">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="page">
    <section class="shell">
      <div class="topbar">
        <p class="eyebrow">Contact</p>
        <div class="lang-switch" role="tablist" aria-label="Language switch">
          <button type="button" class="lang-switch__button is-active" data-lang-target="ko" aria-pressed="true" data-label-ko="한글" data-label-en="Korean">한글</button>
          <button type="button" class="lang-switch__button" data-lang-target="en" aria-pressed="false" data-label-ko="영어" data-label-en="English">영어</button>
        </div>
      </div>

      <section class="lang-panel" data-lang="ko">
        <h1>문의</h1>

        <p>
          아래 폼으로 문의를 남겨 주세요.
        </p>

        <form class="contact-form" action="/contact" method="post">
          <div class="form-grid">
            <label class="field">
              <span>이름</span>
              <input type="text" name="name" autocomplete="name" required maxlength="60">
            </label>

            <label class="field">
              <span>이메일</span>
              <input type="email" name="email" autocomplete="email" required maxlength="120">
            </label>

            <label class="field">
              <span>문의 유형</span>
              <select name="category" required>
                <option value="" selected disabled>선택해 주세요</option>
                <option value="general">일반 문의</option>
                <option value="business">제휴 문의</option>
                <option value="press">보도 문의</option>
              </select>
            </label>

            <label class="field field-full">
              <span>내용</span>
              <textarea name="message" rows="7" required maxlength="4000"></textarea>
            </label>

            <label class="honeypot" aria-hidden="true">
              <span>웹사이트</span>
              <input type="text" name="website" tabindex="-1" autocomplete="off">
            </label>
          </div>

          <div class="form-actions">
            <button type="submit" data-label-ko="보내기" data-label-en="Send">보내기</button>
          </div>
        </form>

        <nav class="nav" aria-label="페이지 이동">
          <a href="/" data-label-ko="홈으로" data-label-en="Home">홈으로</a>
          <a href="/notices.html" data-label-ko="공고" data-label-en="Notices">공고</a>
        </nav>
      </section>

      <section class="lang-panel" data-lang="en" hidden>
        <h1>Contact</h1>

        <p>
          Send an inquiry through the form below.
        </p>

        <form class="contact-form" action="/contact" method="post">
          <div class="form-grid">
            <label class="field">
              <span>Name</span>
              <input type="text" name="name" autocomplete="name" required maxlength="60">
            </label>

            <label class="field">
              <span>Email</span>
              <input type="email" name="email" autocomplete="email" required maxlength="120">
            </label>

            <label class="field">
              <span>Inquiry type</span>
              <select name="category" required>
                <option value="" selected disabled>Select one</option>
                <option value="general">General inquiry</option>
                <option value="business">Business inquiry</option>
                <option value="press">Press inquiry</option>
              </select>
            </label>

            <label class="field field-full">
              <span>Message</span>
              <textarea name="message" rows="7" required maxlength="4000"></textarea>
            </label>

            <label class="honeypot" aria-hidden="true">
              <span>Website</span>
              <input type="text" name="website" tabindex="-1" autocomplete="off">
            </label>
          </div>

          <div class="form-actions">
            <button type="submit" data-label-ko="Send" data-label-en="Send">Send</button>
          </div>
        </form>

        <nav class="nav" aria-label="Page navigation">
          <a href="/" data-label-ko="Home" data-label-en="Home">Home</a>
          <a href="/notices.html" data-label-ko="Notices" data-label-en="Notices">Notices</a>
        </nav>
      </section>
    </section>
  </main>

  <footer class="page footer">
    <div class="footer-grid">
      <div>
        <p class="eyebrow">Contact</p>
        <p class="muted">Inquiry form</p>
      </div>
      <div class="footer-links">
        <a href="/" data-label-ko="홈" data-label-en="Home">홈</a>
        <a href="/notices.html" data-label-ko="공고" data-label-en="Notices">공고</a>
      </div>
    </div>
  </footer>

  <script src="/lang-switch.js"></script>
</body>
</html>
