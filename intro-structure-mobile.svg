<svg width="360" height="760" viewBox="0 0 360 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sizlon verification structure mobile</title>
  <desc id="desc">A vertical diagram showing input, fixed specification, verification, and recorded PASS, FAIL, or UNKNOWN output.</desc>
  <rect width="360" height="760" rx="28" fill="#F8FAFF"/>
  <rect x="20" y="20" width="320" height="720" rx="22" fill="#FFFFFF" stroke="#D9DEEA" stroke-width="2"/>

  <rect x="72" y="60" width="216" height="124" rx="18" fill="#FBFCFF" stroke="#D9DEEA" stroke-width="2"/>
  <text x="180" y="94" text-anchor="middle" fill="#183B7A" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">INPUT</text>
  <rect x="102" y="112" width="156" height="12" rx="6" fill="#EEF3FF"/>
  <rect x="102" y="132" width="124" height="12" rx="6" fill="#EEF3FF"/>
  <rect x="102" y="152" width="142" height="12" rx="6" fill="#EEF3FF"/>

  <path d="M180 186V230" stroke="#183B7A" stroke-width="4" stroke-linecap="round"/>
  <path d="M170 220L180 232L190 220" stroke="#183B7A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="60" y="232" width="240" height="164" rx="20" fill="#183B7A"/>
  <text x="180" y="268" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">SPECIFICATION</text>
  <text x="180" y="294" text-anchor="middle" fill="#D7E4FF" font-family="Arial, Helvetica, sans-serif" font-size="13">Fixed</text>
  <rect x="88" y="316" width="184" height="14" rx="7" fill="#2A549E"/>
  <rect x="88" y="340" width="160" height="14" rx="7" fill="#2A549E"/>
  <text x="180" y="374" text-anchor="middle" fill="#D7E4FF" font-family="Arial, Helvetica, sans-serif" font-size="13">Defined outside</text>

  <path d="M180 398V438" stroke="#183B7A" stroke-width="4" stroke-linecap="round"/>
  <path d="M170 428L180 440L190 428" stroke="#183B7A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="60" y="440" width="240" height="136" rx="20" fill="#FBFCFF" stroke="#D9DEEA" stroke-width="2"/>
  <text x="180" y="476" text-anchor="middle" fill="#183B7A" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">VERIFICATION</text>
  <text x="180" y="502" text-anchor="middle" fill="#5D6475" font-family="Arial, Helvetica, sans-serif" font-size="13">Terminating</text>
  <rect x="90" y="522" width="180" height="14" rx="7" fill="#EEF3FF"/>
  <rect x="90" y="544" width="132" height="14" rx="7" fill="#EEF3FF"/>
  <text x="180" y="578" text-anchor="middle" fill="#5D6475" font-family="Arial, Helvetica, sans-serif" font-size="13">Rule execution only</text>

  <path d="M180 576V612" stroke="#183B7A" stroke-width="4" stroke-linecap="round"/>
  <path d="M170 602L180 614L190 602" stroke="#183B7A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="76" y="614" width="208" height="104" rx="18" fill="#FFFFFF" stroke="#D9DEEA" stroke-width="2"/>
  <text x="180" y="646" text-anchor="middle" fill="#183B7A" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">RECORD</text>
  <rect x="94" y="664" width="56" height="22" rx="11" fill="#E8F2E7"/>
  <text x="122" y="679" text-anchor="middle" fill="#1F5D2F" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">PASS</text>
  <rect x="152" y="664" width="56" height="22" rx="11" fill="#FDEBEC"/>
  <text x="180" y="679" text-anchor="middle" fill="#8A2332" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">FAIL</text>
  <rect x="210" y="664" width="72" height="22" rx="11" fill="#EFF1F6"/>
  <text x="246" y="679" text-anchor="middle" fill="#475063" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">UNKNOWN</text>
  <text x="180" y="716" text-anchor="middle" fill="#5D6475" font-family="Arial, Helvetica, sans-serif" font-size="13">Interpretation external</text>
</svg>
